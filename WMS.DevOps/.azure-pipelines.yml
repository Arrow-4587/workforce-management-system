trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =====================================================
# BUILD BACKEND
# =====================================================

- stage: BuildBackend
  displayName: 'Build Backend'

  jobs:

  - job: BuildAPI
    displayName: 'Build ASP.NET Core API'

    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore API'
      inputs:
        command: 'restore'
        projects: 'WMS.API/WMS.API.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build API'
      inputs:
        command: 'build'
        projects: 'WMS.API/WMS.API.csproj'
        arguments: '--configuration $(buildConfiguration)'

    # Uncomment later when test projects exist
    #
    # - task: DotNetCoreCLI@2
    #   displayName: 'Run Tests'
    #   inputs:
    #     command: 'test'
    #     projects: '**/*Tests/*.csproj'
    #     arguments: '--configuration $(buildConfiguration)'

    - task: DotNetCoreCLI@2
      displayName: 'Publish API'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'WMS.API/WMS.API.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish API Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/api'
        ArtifactName: 'api'

# =====================================================
# DEPLOY BACKEND
# =====================================================

- stage: DeployBackend
  displayName: 'Deploy Backend'
  dependsOn: BuildBackend
  condition: succeeded()

  jobs:

  - job: DeployAPI
    displayName: 'Deploy API using MSDeploy'

    steps:

    - download: current
      artifact: api

    - task: AzureRmWebAppDeployment@4
      displayName: 'Deploy via MSDeploy'
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: 'Azure-ServiceConnection'
        appType: 'webApp'
        WebAppName: 'wms-api-indresh-2026'
        packageForLinux: '$(Pipeline.Workspace)/api'
        enableCustomDeployment: true
        DeploymentType: 'webDeploy'