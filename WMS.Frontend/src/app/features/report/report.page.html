<section class="page">
      <header class="page-header">
        <div>
          <p class="eyebrow">Data & Analytics</p>
          <h2>System Reports</h2>
          <p class="subtitle">Download raw data explicitly tailored to your needs in Excel format.</p>
        </div>
        <div class="header-actions">
          <button class="btn btn--primary" (click)="downloadSelected()" [disabled]="downloading() || !selectedReport()">
            <svg *ngIf="downloading()" class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
            <svg *ngIf="!downloading()" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v9M4 7l4 4 4-4M2 14h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            {{ downloading() ? 'Generating...' : 'Download Excel' }}
          </button>
        </div>
      </header>

      <div class="table-card">
        <div class="reports-grid">
          <div *ngFor="let r of reports" 
               class="report-card" 
               [class.active]="selectedReport() === r.id"
               (click)="selectedReport.set(r.id)">
            <div class="report-icon">{{ r.icon }}</div>
            <div class="report-info">
              <h3>{{ r.name }}</h3>
              <p>{{ r.desc }}</p>
            </div>
            <div class="report-check">
              <svg *ngIf="selectedReport() === r.id" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="var(--primary)"/><path d="M5.5 10.5L8.5 13.5L14.5 6.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <div *ngIf="selectedReport() !== r.id" class="check-placeholder"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
