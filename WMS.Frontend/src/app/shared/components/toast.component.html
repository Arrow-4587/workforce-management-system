<div class="toast-container" aria-live="polite" aria-atomic="false">
      <div
        *ngFor="let toast of toastService.toasts(); trackBy: trackById"
        class="toast"
        [ngClass]="['toast--' + toast.type, toast.leaving ? 'toast--leaving' : '']"
        role="alert"
      >
        <div class="toast-icon" aria-hidden="true">
          <svg *ngIf="toast.type === 'success'" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg *ngIf="toast.type === 'error'" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <svg *ngIf="toast.type === 'warning'" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 4.5v3M6 9h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <svg *ngIf="toast.type === 'info'" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 5.5v4M6 3h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="toast-body">
          <div class="toast-title">{{ toast.title }}</div>
          <div class="toast-message" *ngIf="toast.message">{{ toast.message }}</div>
        </div>
        <button
          type="button"
          class="toast-close"
          (click)="toastService.dismiss(toast.id)"
          aria-label="Dismiss"
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
