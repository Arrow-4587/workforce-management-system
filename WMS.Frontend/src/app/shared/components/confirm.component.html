<div class="modal-backdrop" *ngIf="confirmService.state().isOpen" (click)="onBackdropClick($event)">
      <div class="modal-card">
        <div class="modal-header">
          <div class="modal-icon" [ngClass]="{'is-destructive': confirmService.state().isDestructive}">
            <svg *ngIf="confirmService.state().isDestructive" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/>
            </svg>
            <svg *ngIf="!confirmService.state().isDestructive" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
            </svg>
          </div>
          <button class="close-btn" (click)="confirmService.cancel()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-content">
          <h3>{{ confirmService.state().title }}</h3>
          <p>{{ confirmService.state().message }}</p>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" (click)="confirmService.cancel()">
            {{ confirmService.state().cancelText || 'Cancel' }}
          </button>
          <button class="btn" [ngClass]="confirmService.state().isDestructive ? 'btn-danger' : 'btn-primary'" (click)="confirmService.confirm()">
            {{ confirmService.state().confirmText || 'Confirm' }}
          </button>
        </div>
      </div>
    </div>
