trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =====================================================
# BUILD & TEST BACKEND
# =====================================================

- stage: BuildBackend
  displayName: 'Build Backend'

  jobs:

  - job: BuildAPI
    displayName: 'Build ASP.NET Core API'

    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore API'
      inputs:
        command: 'restore'
        projects: 'WMS.API/WMS.API.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build API'
      inputs:
        command: 'build'
        projects: 'WMS.API/WMS.API.csproj'
        arguments: '--configuration $(buildConfiguration)'

    # Uncomment when you add test projects
    #
    # - task: DotNetCoreCLI@2
    #   displayName: 'Run Tests'
    #   inputs:
    #     command: 'test'
    #     projects: '**/*Tests/*.csproj'
    #     arguments: '--configuration $(buildConfiguration)'

    - task: DotNetCoreCLI@2
      displayName: 'Publish API'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'WMS.API/WMS.API.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'

    - task: ArchiveFiles@2
      displayName: 'Create Deployment ZIP'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/api'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/api.zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      displayName: 'Publish API Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/api.zip'
        ArtifactName: 'api'

# =====================================================
# DEPLOY BACKEND
# =====================================================

- stage: DeployBackend
  displayName: 'Deploy Backend'
  dependsOn: BuildBackend
  condition: succeeded()

  jobs:

  - deployment: DeployAPI
    displayName: 'Deploy API to Azure App Service'
    environment: 'Production'

    strategy:
      runOnce:
        deploy:

          steps:

          - download: current
            artifact: api

          - task: AzureWebApp@1
            displayName: 'Deploy to Existing App Service'
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              appType: 'webApp'
              appName: 'wms-api-indresh-2026'
              package: '$(Pipeline.Workspace)/api/api.zip'

          # Optional health check
          # Replace URL with your actual API endpoint
          #
          # - script: |
          #     curl -I https://your-api-url.azurewebsites.net/swagger
          #   displayName: 'Verify Deployment'